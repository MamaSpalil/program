version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cryptotrader-postgres
    environment:
      POSTGRES_DB: cryptotrader
      POSTGRES_USER: cryptotrader
      POSTGRES_PASSWORD: cryptotrader_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptotrader"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cryptotrader-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: cryptotrader-backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://cryptotrader:cryptotrader_password@postgres:5432/cryptotrader
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: development-secret-change-in-production
      ENCRYPTION_KEY: 12345678901234567890123456789012
      ML_SERVICE_URL: http://ml-service:8000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  ml-service:
    build:
      context: ./ml-service
      dockerfile: ../docker/ml-service.Dockerfile
    container_name: cryptotrader-ml
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://cryptotrader:cryptotrader_password@postgres:5432/cryptotrader
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: cryptotrader-frontend
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
      VITE_WS_URL: ws://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
