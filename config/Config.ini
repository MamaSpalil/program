; ============================================================================
; Config.ini — Window Layout Configuration
; ============================================================================
; This file allows you to customize the position and size of each window
; inside the program. Edit the x, y, width, and height values to move
; and resize windows as desired.
;
; Coordinates:
;   x      — horizontal position (pixels from left edge)
;   y      — vertical position (pixels from top edge)
;   width  — window width in pixels
;   height — window height in pixels
;
; The default values below are calculated for a 1920x1080 screen.
; After editing, restart the program to apply changes.
; To reset to defaults, delete this file — it will be recreated automatically.
; ============================================================================

